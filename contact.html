<body>
   

   <nav>
    <div class="logo">Lilly lens Photography</div>
    <ul id="nav-links">
      <a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a> 
    </ul>
  </nav>


  <header class="hero" id="home">
    <div class="overlay">
      <h1>CONTACT ME </h1>
      <p>Lillian Wick</p>
    </div>
  </header>


 <section class="contact-page" id="contact">

  <div class="contact-left">
    <img src="images/497280495_17864256699391733_5615908574669721626_n.jpg" alt="Photography contact image">
  </div>

  <div class="contact-right">
    <h1>CONTACT ME</h1>
    <p>
      Ready to capture your story? I’d love to hear from you.
      Fill out the form below and I’ll get back to you soon.
    </p>

    <form class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Your email">

      <label for="session">Session Type</label>
      <select id="session" name="session">
        <option>Portrait Session</option>
        <option>Couples Session</option>
        <option>Engagement Session</option>
        <option>Event Photography</option>
        <option>Branding Session</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell me what you're looking for"></textarea>

      <button type="submit">Send Inquiry</button>
    </form>
  </div>

</section>


 <section class="cta">
   <h2>Let’s Capture Your Story</h2>
   <button>Book a Session</button>
 </section>
